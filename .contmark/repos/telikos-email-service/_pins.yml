stack:
  build: maven
  language: java
  framework: webflux

modules:
  service: service
  test: src/test/java
  componentTest: componenttest        # corrected: real CT module — 8 .feature files, 171 step-defs

# Exact commands — standalone module poms (no root reactor). Run verbatim.
commands:
  build:          "mvn -f service/pom.xml clean package"
  unit_test:      "mvn -f service/pom.xml test"
  component_test: "mvn -f componenttest/pom.xml verify -Dspring.profiles.active=local"
  lint:           "none"
  verify:         "mvn -f service/pom.xml verify"

features:
  kafka: true
  temporal: true
  database: mongo
  avro: true

contmark_skills:
  always:  [execution-core, project-context]
  stack:   [spring-java-conventions, java-reactive-patterns]
  build:   [maven-build-profiles]
  domain:  [kafka-consumer-patterns, temporal-workflow-patterns]
  review:  [code-review-checklist]
  test:    [unit-testing-java, component-testing-cucumber]
  pr:      [pr-delivery-and-triage]
  plan:    [plan-templates]
