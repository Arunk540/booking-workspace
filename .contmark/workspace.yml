workspace: booking-workspace
version: 3
mode: workspace
repos:
  - key: telikos-booking-service-1
    domains: [booking, service-plan, tms-dispatch, vessel-tracking, customs, iom]
    depends_on: []
  - key: telikos-activityplanworkflow-service_02
    domains: [activity-plan, workflow-orchestration, billing, customs, tms-dispatch]
    depends_on: [telikos-booking-service-1]
  - key: telikos-email-service-02
    domains: [email-notification, sendgrid]
    depends_on: [telikos-activityplanworkflow-service_02]

routing_rules:
  - match: [booking, service-plan, rfp, ready-for-planning]
    repos: [telikos-booking-service-1]
  - match: [activity-plan, workflow-orchestration, domain-rules, ap-workflow]
    repos: [telikos-activityplanworkflow-service_02]
  - match: [email, sendgrid, notification]
    repos: [telikos-email-service-02]
  - match: [tms]
    repos: [telikos-booking-service-1, telikos-activityplanworkflow-service_02]
  - match: [customs]
    repos: [telikos-booking-service-1, telikos-activityplanworkflow-service_02]
  - match: [activity-plan]
    repos: [telikos-booking-service-1, telikos-activityplanworkflow-service_02]

cross_repo_contracts:
  - topic_or_endpoint: TEMPORAL_ACTIVITY_PLAN_TASK_QUEUE
    producer: telikos-booking-service-1
    consumers: [telikos-activityplanworkflow-service_02]
    protocol: temporal-signal
    schema_path: telikos-activityplanworkflow-service_02/common/src/main/resources/avro/ActivityPlanInternal.v2.avsc
  - topic_or_endpoint: EMAIL_TASK_QUEUE
    producer: telikos-activityplanworkflow-service_02
    consumers: [telikos-email-service-02]
    protocol: temporal-signal
    schema_path: telikos-activityplanworkflow-service_02/common/src/main/resources/avro/ActivityPlanInternal.v2.avsc
  - topic_or_endpoint: EMAIL_TASK_QUEUE_INVOICE_DISPATCH
    producer: telikos-activityplanworkflow-service_02
    consumers: [telikos-email-service-02]
    protocol: temporal-signal
    schema_path: null
  - topic_or_endpoint: BOOKING_WORKER_TASK_QUEUE
    producer: telikos-activityplanworkflow-service_02
    consumers: [telikos-booking-service-1]
    protocol: temporal-signal
    schema_path: null

# Back-edge removed from depends_on to break the booking ⇄ AP cycle, but kept in
# _global_links.json. Topological sort ignores it; Reviewer + blast-radius honour it.
cycle_breaks:
  - consumer: telikos-booking-service-1
    producer: telikos-activityplanworkflow-service_02
    via: BOOKING_WORKER_TASK_QUEUE
    note: AP signals booking back via task queue; excluded from topo order; reviewer cross-checks
